<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Feedback Form</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Feedback Form</h1>
      <p>Share your feedback securely. All fields are required.</p>
    </header>

    <form id="feedback-form" novalidate>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required />
        <small class="error" id="name-error"></small>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
        <small class="error" id="email-error"></small>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
        <small class="error" id="message-error"></small>
      </div>

      <button type="submit" class="btn">Submit Feedback</button>

      <div class="form-actions">
        <a class="link" href="feedback.html">View Submitted Feedback</a>
      </div>

      <div id="success" class="success" role="status" aria-live="polite"></div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
